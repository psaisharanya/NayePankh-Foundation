      <h1>Contact Us</h1>
      <p>For general inquiries email <a href="mailto:contact@nayepankh.com">contact@nayepankh.com</a> or call +91-8318500748.</p>

      <h3>Send a message</h3>
      <form action="mailto:contact@nayepankh.com" method="post" enctype="text/plain">
        <label>Name<br><input type="text" name="name" required></label><br><br>
        <label>Email<br><input type="email" name="email" required></label><br><br>
        <label>Message<br><textarea name="message" rows="6" required></textarea></label><br><br>
        <button class="btn primary" type="submit">Send</button>
      </form>

    </section>
